    }

      display: none;
    }
    .scrollbar-none {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

      opacity: 0;

    .scroll-reveal.active {

      transform: translateY(0);

    .interactive-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 40px -15px rgba(122, 1, 0, 0.1);
    }

    .nav-link {
      position: relative;
      font-size: 13px;
      font-weight: 500;
      transition: color 0.3s ease;
    }
    .nav-link::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 0;
      height: 1.5px;
      background-color: #7a0100;
      transition: width 0.3s ease;
    }
    .nav-link:hover::after,
    .nav-link.active::after {
      width: 100%;
    }

    img {
      transition: filter 1s ease, transform 1s ease;
    }
    img:hover {
      filter: grayscale(0%);
      transform: scale(1);
    }

    @keyframes dividerSweep {
      0% { transform: scaleX(0); transform-origin: left; }
      50% { transform: scaleX(1); transform-origin: left; }
      51% { transform-origin: right; }
      100% { transform: scaleX(0); transform-origin: right; }
    }
    .divider-sweep::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 1.5px;
      background: linear-gradient(90deg, transparent, #a1140a 30%, #00897B 70%, transparent);
      transform: scaleX(0);
      transform-origin: left;
    }
    .divider-sweep.active::after {
      animation: dividerSweep 1.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .magnetic-btn {
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.3s ease;
    }
    .magnetic-btn:hover { transform: scale(1.04); }
    .magnetic-btn:active { transform: scale(0.97); }

    .btn-arrow-group { display: inline-flex; align-items: center; gap: 0.5rem; }
    .btn-arrow-group .btn-arrow-icon { transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
    .btn-arrow-group:hover .btn-arrow-icon { transform: translateX(5px); }

    @keyframes burstParticle {
      0% { transform: translate(0, 0) scale(1); opacity: 1; }
      100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
    }
    .success-burst {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .success-burst span {
      position: absolute;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      top: 50%;
      left: 50%;
      animation: burstParticle 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes tagPulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.75; transform: scale(0.97); }
    }
    .tag-pulse { animation: tagPulse 3s ease-in-out infinite; }
    .tag-pulse:nth-child(2) { animation-delay: 0.5s; }
    .tag-pulse:nth-child(3) { animation-delay: 1s; }

    .scroll-to-top {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      z-index: 40;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #a1140a;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(161,20,10,0.25);
      cursor: pointer;
      transition: transform 0.3s cubic-bezier(0.16,1,0.3,1), opacity 0.3s ease, box-shadow 0.3s ease;
      opacity: 0;
      transform: translateY(20px);
      pointer-events: none;
    }
    .scroll-to-top.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }
    .scroll-to-top:hover {
      transform: translateY(-3px) scale(1.05);

    .teal-accent-hover:hover { color: #00897B; }
    .teal-accent-ring:focus { outline-color: #00897B; ring-color: #00897B; }

    }

        opacity: 1;
        transform: none;
      }
      .reveal-up {
        animation: none;
        opacity: 1;
        transform: none;
      }
    }

              if (entry.isIntersecting) {
                entry.target.classList.add('active');
                observer.unobserve(entry.target);
              }
            });
          },
          { threshold: 0.1, rootMargin: '0px 0px -50px 0px' }
        );

        document.querySelectorAll('.scroll-reveal').forEach(el => observer.observe(el));
        return () => observer.disconnect();
      }, deps);
    }

    function CountUp({ end, duration = 1500, suffix = "", delay = 0, as = "span" }) {
      const [count, setCount] = React.useState(0);
      const ref = React.useRef(null);
      const hasAnimated = React.useRef(false);

      React.useEffect(() => {
        const observer = new IntersectionObserver(
          ([entry]) => {
            if (entry.isIntersecting && !hasAnimated.current) {
              hasAnimated.current = true;
              setTimeout(() => {
                const startTime = Date.now();
                const animate = () => {
                  const elapsed = Date.now() - startTime;
                  const progress = Math.min(elapsed / duration, 1);
                  const eased = 1 - Math.pow(1 - progress, 3);
                  setCount(Math.floor(eased * end));
                  if (progress < 1) requestAnimationFrame(animate);
                };
                requestAnimationFrame(animate);
              }, delay);
              observer.unobserve(entry.target);
            }
          },
          { threshold: 0.3 }
        );
        if (ref.current) observer.observe(ref.current);
        return () => observer.disconnect();
      }, [end, duration, delay]);

      return React.createElement(as, { ref }, count);
    }

        const observer = new IntersectionObserver(

        observer.observe(el);
        return () => observer.disconnect();

    function NeuralBackground() {
      const canvasRef = React.useRef(null);

      React.useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext("2d");
        if (!ctx) return;

        let points = [];
        const connectionDistance = 180;
        const brandColor = "#a1140a";
        const brandGrey = "#c8c6c5";
        let animationFrameId;

        const resize = () => {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
        };

        class Point {
          constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.vx = (Math.random() - 0.5) * 0.45;
            this.vy = (Math.random() - 0.5) * 0.45;
            this.radius = Math.random() * 2.2 + 1.2;
            this.color = Math.random() > 0.82 ? brandColor : brandGrey;
          }
          update() {
            this.x += this.vx;
            this.y += this.vy;
            if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
            if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
          }
          draw(cContext) {
            cContext.beginPath();
            cContext.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            cContext.fillStyle = this.color;
            cContext.globalAlpha = 0.55;
            cContext.fill();
          }
        }

        const initPoints = () => {
          points = [];
          const count = Math.min(70, Math.floor((window.innerWidth * window.innerHeight) / 18000));
          for (let i = 0; i < Math.max(30, count); i++) points.push(new Point());
        };

        const drawLines = () => {
          for (let i = 0; i < points.length; i++) {
            for (let j = i + 1; j < points.length; j++) {
              const dx = points[i].x - points[j].x;
              const dy = points[i].y - points[j].y;
              const distance = Math.sqrt(dx * dx + dy * dy);
              if (distance < connectionDistance) {
                ctx.beginPath();
                ctx.moveTo(points[i].x, points[i].y);
                ctx.lineTo(points[j].x, points[j].y);
                ctx.strokeStyle = brandColor;
                ctx.globalAlpha = (1 - distance / connectionDistance) * 0.28;
                ctx.lineWidth = 0.7;
                ctx.stroke();
              }
            }
          }
        };

        const animate = () => {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          points.forEach(p => { p.update(); p.draw(ctx); });
          drawLines();
          animationFrameId = requestAnimationFrame(animate);
        };

        const handleResize = () => { resize(); initPoints(); };

        window.addEventListener("resize", handleResize);
        resize();
        initPoints();
        animate();

        return () => {
          cancelAnimationFrame(animationFrameId);
          window.removeEventListener("resize", handleResize);
        };
      }, []);

      return <canvas id="neural-canvas" ref={canvasRef} />;
    }

        const currentLine = linesToType[currentLineIndex];

          if (/^\s+$/.test(token)) return token;

          if (token.startsWith('"')) return `<span class="syntax-value">${escapeHtml(token)}</span>`;

      React.useEffect(() => {

          const currentY = window.scrollY;
          setScrolled(currentY > 20);
          if (currentY > 80) {
            setHidden(currentY > lastScrollY.current);
          } else {
            setHidden(false);

        window.addEventListener('scroll', handleScroll, { passive: true });

      }, []);

      React.useEffect(() => {
        if (!mobileOpen) return;
        const handleTouchStart = (e) => { touchStartX.current = e.touches[0].clientX; };
        const handleTouchEnd = (e) => {
          const dx = e.changedTouches[0].clientX - touchStartX.current;
          if (dx > 80) setMobileOpen(false);
        };
        document.addEventListener('touchstart', handleTouchStart, { passive: true });
        document.addEventListener('touchend', handleTouchEnd, { passive: true });
        return () => { document.removeEventListener('touchstart', handleTouchStart); document.removeEventListener('touchend', handleTouchEnd); };

      };

      const handleSubmit = (e) => {
        e.preventDefault();
        if (!validate()) return;
        setIsSubmitting(true);
        setTimeout(() => {
          setIsSubmitting(false);
          setIsSuccess(true);
          setFormData({ firstName: "", lastName: "", email: "", organization: "", message: "" });
        }, 1500);
      };

      return (
        <section className="relative z-10 bg-brand-bg border-t border-[#e3beb8]/10 overflow-hidden font-sans">
          <SectionDivider />
          <div className="max-w-[1440px] mx-auto px-4 sm:px-8 md:px-16 lg:px-20 xl:px-28 py-24 md:py-32">
            <div className="grid grid-cols-1 lg:grid-cols-12 gap-16 items-start">
              <div className="lg:col-span-5 space-y-8">
                <div className="scroll-reveal flex items-center gap-3">
                  <div className="w-8 h-[1px] bg-brand-red"></div>
                  <span className="font-mono text-[10px] font-semibold uppercase tracking-[0.2em] text-brand-red">
                    Get in Touch
                  </span>
                </div>
                <h2 className="scroll-reveal scroll-reveal-delay-100 font-serif text-[40px] md:text-[50px] leading-[1.1] text-brand-dark tracking-tight">
                  Start a <span className="italic text-brand-bright">conversation</span>
                </h2>
                <p className="scroll-reveal scroll-reveal-delay-200 text-sm md:text-base text-brand-muted leading-relaxed max-w-md">
                  Our leadership is committed to delivering value, driving innovation, and fostering a culture of excellence. Reach out — let's discuss your vision.
                </p>
                <div className="scroll-reveal scroll-reveal-delay-300 space-y-6 pt-6">
                  <div className="flex items-start gap-4">
                    <div className="w-10 h-10 rounded-xl bg-brand-red/5 flex items-center justify-center text-brand-red shrink-0 mt-1">
                      <Icon name="Phone" className="w-5 h-5" />
                    </div>
                    <div className="space-y-1">
                      <span className="text-[10px] font-mono font-semibold uppercase tracking-widest text-brand-muted">Phone</span>
                      <div className="text-sm font-bold text-brand-dark flex flex-col">
                        <span>+234 901 642 8181</span>
                        <span>+234 809 814 0576</span>
                      </div>
                    </div>
                  </div>
                  <div className="flex items-start gap-4">
                    <div className="w-10 h-10 rounded-xl bg-brand-red/5 flex items-center justify-center text-brand-red shrink-0 mt-1">
                      <Icon name="Mail" className="w-5 h-5" />
                    </div>
                    <div className="space-y-1">
                      <span className="text-[10px] font-mono font-semibold uppercase tracking-widest text-brand-muted">Email</span>
                      <div className="text-sm font-bold text-brand-dark hover:text-brand-bright transition-colors">
                        <a href="mailto:info@clukstars.com">info@clukstars.com</a>
                      </div>
                    </div>
                  </div>
                  <div className="flex items-start gap-4">
                    <div className="w-10 h-10 rounded-xl bg-brand-red/5 flex items-center justify-center text-brand-red shrink-0 mt-1">
                      <Icon name="MapPin" className="w-5 h-5" />
                    </div>
                    <div className="space-y-1">
                      <span className="text-[10px] font-mono font-semibold uppercase tracking-widest text-brand-muted">Address</span>
                      <div className="text-sm font-bold text-brand-dark leading-relaxed">
                        33 Parakou Street, Wuse 2<br />
                        Abuja FCT, Nigeria
                      </div>
                    </div>
                  </div>
                </div>
              </div>
              <div className="lg:col-span-7 w-full lg:pl-8">
                <div className="scroll-reveal scroll-reveal-delay-200 bg-[#f9f9f9] border border-[#e3beb8]/30 rounded-2xl p-6 sm:p-8 md:p-10 shadow-sm relative">
                  {!isSuccess ? (
                    <form onSubmit={handleSubmit} className="space-y-6">
                      <div className="grid grid-cols-1 sm:grid-cols-2 gap-6">
                        <div className="space-y-1.5">
                          <label className="text-[11px] font-mono uppercase tracking-wider text-brand-dark font-semibold">First Name</label>
                          <input
                            type="text"
                            className={`input-focus-glow w-full text-sm py-2.5 px-3.5 bg-white border ${errors.firstName ? "border-red-500 bg-red-50/10" : "border-[#e3beb8]/30 hover:border-brand-red/40 focus:border-brand-red"} rounded-xl outline-none font-sans text-brand-dark shadow-sm`}
                            placeholder="John"
                            value={formData.firstName}
                            onChange={(e) => setFormData({ ...formData, firstName: e.target.value })}
                          />
                          {errors.firstName && <p className="text-[11px] text-red-600 font-medium">{errors.firstName}</p>}
                        </div>
                        <div className="space-y-1.5">
                          <label className="text-[11px] font-mono uppercase tracking-wider text-brand-dark font-semibold">Last Name</label>
                          <input
                            type="text"
                            className={`input-focus-glow w-full text-sm py-2.5 px-3.5 bg-white border ${errors.lastName ? "border-red-500 bg-red-50/10" : "border-[#e3beb8]/30 hover:border-brand-red/40 focus:border-brand-red"} rounded-xl outline-none font-sans text-brand-dark shadow-sm`}
                            placeholder="Doe"
                            value={formData.lastName}
                            onChange={(e) => setFormData({ ...formData, lastName: e.target.value })}
                          />
                          {errors.lastName && <p className="text-[11px] text-red-600 font-medium">{errors.lastName}</p>}
                        </div>
                      </div>
                      <div className="space-y-1.5">
                        <label className="text-[11px] font-mono uppercase tracking-wider text-brand-dark font-semibold">Email Address</label>
                        <input
                          type="email"
                          className={`input-focus-glow w-full text-sm py-2.5 px-3.5 bg-white border ${errors.email ? "border-red-500 bg-red-50/10" : "border-[#e3beb8]/30 hover:border-brand-red/40 focus:border-brand-red"} rounded-xl outline-none font-sans text-brand-dark shadow-sm`}
                          placeholder="john@organisation.gov.ng"
                          value={formData.email}
                          onChange={(e) => setFormData({ ...formData, email: e.target.value })}
                        />
                        {errors.email && <p className="text-[11px] text-red-600 font-medium">{errors.email}</p>}
                      </div>
                      <div className="space-y-1.5">
                        <label className="text-[11px] font-mono uppercase tracking-wider text-brand-dark font-semibold">Organisation</label>
                        <input
                          type="text"
                          className="w-full text-sm py-2.5 px-3.5 bg-white border border-[#e3beb8]/30 hover:border-brand-red/40 focus:border-brand-red rounded-xl outline-none transition-all font-sans text-brand-dark shadow-sm"
                          placeholder="Your organisation"
                          value={formData.organization}
                          onChange={(e) => setFormData({ ...formData, organization: e.target.value })}
                        />
                      </div>
                      <div className="space-y-1.5">
                        <label className="text-[11px] font-mono uppercase tracking-wider text-brand-dark font-semibold">Message</label>
                        <textarea
                          rows={4}
                          className={`w-full text-sm py-2.5 px-3.5 bg-white border ${errors.message ? "border-red-500 bg-red-50/10" : "border-[#e3beb8]/30 hover:border-brand-red/40 focus:border-brand-red"} rounded-xl outline-none transition-all font-sans text-brand-dark shadow-sm resize-none`}
                          placeholder="Tell us about your project or partnership interest..."
                          value={formData.message}
                          onChange={(e) => setFormData({ ...formData, message: e.target.value })}
                        />
                        {errors.message && <p className="text-[11px] text-red-600 font-medium">{errors.message}</p>}
                      </div>
                      <button
                        type="submit"
                        disabled={isSubmitting}
                        className="magnetic-btn w-full bg-[#7a0100] hover:bg-[#a1140a] text-white py-3.5 px-6 rounded-xl font-bold text-xs flex items-center justify-center gap-2 shadow-sm hover:shadow-md transition-shadow cursor-pointer disabled:opacity-50 btn-arrow-group"
                      >
                        {isSubmitting ? (
                          <><div className="w-4 h-4 rounded-full border-2 border-white/30 border-t-white animate-spin"></div> Processing...</>
                        ) : (
                          <>Send Message <Icon name="ArrowRight" className="w-3.5 h-3.5 text-white btn-arrow-icon" /></>
                        )}
                      </button>
                    </form>
                  ) : (
                    <div className="text-center py-12 space-y-6">
                      <div className="w-16 h-16 rounded-full bg-emerald-100 text-emerald-600 flex items-center justify-center mx-auto mb-2 relative">
                        <div className="absolute inset-0 rounded-full bg-emerald-400/20 animate-ping"></div>
                        <Icon name="Check" className="w-8 h-8" />
                        <div className="success-burst">
                          {Array.from({ length: 8 }).map((_, i) => (
                            <span key={i} style={{ '--tx': `${Math.cos(i * Math.PI / 4) * 60}px`, '--ty': `${Math.sin(i * Math.PI / 4) * 60}px`, background: ['#7a0100','#a1140a','#00897B','#27c93f','#fdd663','#ff5f56','#8ab4f8','#ffbd2e'][i], animationDelay: `${i * 0.05}s` }} />
                          ))}
                        </div>
                      </div>
                      <div className="space-y-2">
                        <h4 className="font-serif text-2xl font-bold text-brand-dark">Message Sent</h4>
                        <p className="text-sm text-brand-muted max-w-sm mx-auto">Your message was successfully sent. Our team will initialize contact within 18 hours.</p>
                      </div>
                      <button
                        onClick={() => setIsSuccess(false)}
                        className="bg-brand-dark text-white px-8 py-3 rounded-full font-bold text-xs flex items-center gap-2 hover:bg-brand-red transition-all mx-auto cursor-pointer"
                      >
                        Reset Form
                      </button>
                    </div>
                  )}
                </div>
              </div>
            </div>
          </div>
        </section>
      );
    }

    function App() {
      const [isPartnershipOpen, setIsPartnershipOpen] = React.useState(false);
      const [isServicesOpen, setIsServicesOpen] = React.useState(false);

      return (
        <div className="relative min-h-screen text-brand-dark overflow-x-hidden font-sans selection:bg-brand-red/10 selection:text-brand-red antialiased">
          <NeuralBackground />
          <Navbar activePage="home" />
          <main className="relative min-h-screen flex items-center px-4 sm:px-8 md:px-16 lg:px-20 xl:px-28 w-full z-10 pt-20 md:pt-24 pb-16">
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-16 lg:gap-12 items-center w-full">
              <div className="flex flex-col space-y-12 w-full">
                <div className="space-y-6">
                  <div className="flex items-center gap-4 reveal-up animate-delay-100">
                    <div className="w-10 h-[1.5px] bg-[#7a0100]"></div>
                    <span className="font-mono text-[10px] font-semibold uppercase tracking-[0.25em] text-[#7a0100]">
                      Intelligence Redefined
                    </span>
                  </div>
                  <h1 className="font-serif text-5xl md:text-7xl leading-[1.05] text-brand-dark font-medium tracking-tight reveal-up animate-delay-250">
                    <span className="block mb-1">
                      <span className="italic text-[#a1140a]">Technology</span> built for
                    </span>
                    <span className="block font-medium tracking-tight text-brand-dark">
                      Public & Private
                    </span>
                    <span className="block font-serif text-brand-dark">
                      Sector Excellence
                    </span>
                  </h1>
                  <p className="font-sans text-[#5f5e5e] text-sm md:text-base max-w-2xl leading-relaxed reveal-up animate-delay-400">
                    Empowering governments and enterprises with AI-driven automation and bespoke software engineered to deliver measurable, lasting impact across digital infrastructure.
                  </p>
                </div>
                <div className="flex flex-wrap items-center gap-6 reveal-up animate-delay-300">
                  <button
                    onClick={() => setIsPartnershipOpen(true)}
                    className="premium-btn magnetic-btn bg-[#a1140a] text-white px-8 py-4 rounded-full font-sans text-sm font-bold flex items-center gap-3 cursor-pointer shadow-md btn-arrow-group"
                  >
                    <span>Explore Partnership</span>
                    <Icon name="ArrowRight" className="w-4 h-4 text-white btn-arrow-icon" />
                  </button>
                  <button
                    onClick={() => setIsServicesOpen(true)}
                    className="group flex items-center gap-2 text-brand-dark font-bold font-sans text-sm py-4 px-4 transition-colors hover:text-[#00897B] cursor-pointer teal-accent-hover"
                  >
                    Our Services
                    <Icon name="Plus" className="w-4.5 h-4.5 text-brand-muted transition-transform group-hover:rotate-90 group-hover:text-[#00897B]" />
                  </button>
                </div>
              </div>
              <div className="relative flex flex-col items-stretch reveal-up animate-delay-400 w-full">
                <InteractiveTerminal />
                <div className="absolute -inset-10 bg-brand-red/5 blur-[100px] -z-10 rounded-full" />
              </div>
            </div>
          </main>
          <CoreServicesSection />
          <TechnologicalEdgeSection />
          <WhyPartnerSection onOpenPartnership={() => setIsPartnershipOpen(true)} />
          <GetInTouchSection />
          <Footer />
          <ScrollToTop />
          <PartnershipModal isOpen={isPartnershipOpen} onClose={() => setIsPartnershipOpen(false)} />
          <ServicesPanel isOpen={isServicesOpen} onClose={() => setIsServicesOpen(false)} onOpenPartnership={() => setIsPartnershipOpen(true)} />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('app'));
    root.render(<App />);
  </script>
</body>
</html>
